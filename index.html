<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3sfor & batah</title>
    <!-- استيراد خط تجوال من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- استيراد مكتبة PeerJS للاتصال P2P -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- استيراد مكتبة أيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #008069;
            --secondary-color: #00a884;
            --bg-color: #0b141a;
            --chat-bg: #0b141a;
            --msg-out: #005c4b;
            --msg-in: #202c33;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --danger: #ef5350;
            --success: #25d366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #111b21;
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* حاوية التطبيق */
        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 95vh;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-radius: 0;
        }

        @media (min-width: 768px) {
            .app-container {
                height: 90vh;
                border-radius: 12px;
                border: 1px solid #222d34;
            }
        }

        /* الشاشات (تسجيل الدخول / الدردشة) */
        .screen {
            flex: 1;
            display: none; /* مخفي افتراضياً */
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* شاشة تسجيل الدخول / الاتصال */
        .login-screen {
            padding: 40px;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-area i {
            font-size: 60px;
            color: var(--secondary-color);
            margin-bottom: 15px;
        }

        .logo-area h2 {
            font-size: 28px;
            font-weight: 700;
        }

        .input-group {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background-color: #202c33;
            border: 1px solid #222d34;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--secondary-color);
        }

        /* زر النسخ */
        .copy-btn {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--secondary-color);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            transition: transform 0.2s;
        }
        
        .copy-btn:active {
            transform: translateY(-50%) scale(0.9);
        }

        .btn-primary {
            width: 100%;
            max-width: 400px;
            padding: 14px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary:hover {
            background-color: var(--primary-color);
        }

        .btn-primary:disabled {
            background-color: #374045;
            cursor: not-allowed;
            color: #8696a0;
        }

        .my-id-display {
            background-color: #202c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #374045;
            position: relative;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .my-id-text {
            font-family: monospace;
            font-size: 18px;
            color: var(--secondary-color);
            letter-spacing: 1px;
            word-break: break-all;
        }

        /* واجهة الدردشة */
        .chat-header {
            padding: 15px 20px;
            background-color: #202c33;
            border-bottom: 1px solid #222d34;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #374045;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #fff;
        }

        .status {
            display: flex;
            flex-direction: column;
        }

        .status-name {
            font-weight: 700;
            font-size: 16px;
        }

        .status-text {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-text.online { color: var(--success); }
        .status-text.offline { color: var(--text-secondary); }

        .chat-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            margin-left: 15px;
        }

        .chat-actions button:hover { color: #fff; }

        /* منطقة الرسائل */
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: linear-gradient(rgba(11, 20, 26, 0.9), rgba(11, 20, 26, 0.9)), url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: contain;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
        }

        .message.received {
            align-self: flex-start;
            background-color: var(--msg-in);
            border-top-right-radius: 0;
        }

        .message.sent {
            align-self: flex-end;
            background-color: var(--msg-out);
            border-top-left-radius: 0;
        }

        .msg-time {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            text-align: left;
            margin-top: 4px;
            display: block;
        }

        .system-msg {
            align-self: center;
            background-color: #1b262c;
            color: var(--text-secondary);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin: 10px 0;
            box-shadow: none;
        }

        /* منطقة الإدخال */
        .input-area {
            padding: 10px 16px;
            background-color: #202c33;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            background-color: #2a3942;
            color: white;
            font-family: inherit;
            outline: none;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: var(--secondary-color);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }
        
        /* التنبيهات */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b141a;
        }
        ::-webkit-scrollbar-thumb {
            background: #374045;
            border-radius: 3px;
        }

    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="app-container">
        
        <!-- شاشة الدخول / الاتصال -->
        <div class="screen active" id="login-screen">
            <div class="login-screen">
                <div class="logo-area">
                    <i class="fa-solid fa-comments"></i>
                    <h2>أي شيء</h2>
                    <p style="color: var(--text-secondary); margin-top: 10px;">كلنا بعبوعة</p>
                </div>

                <!-- إدخال الاسم -->
                <div class="input-group">
                    <label>اسم العصفورة</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username-input" placeholder="مثال: أ or و..." maxlength="20">
                    </div>
                </div>

                <!-- عرض الرابط -->
                <div class="input-group">
                    <label>رابطك الشخصي (أرسله لعبدك)</label>
                    <div class="my-id-display">
                        <span id="my-id" style="color: #666;">جاري الإنشاء...</span>
                        <button class="copy-btn" id="copy-btn" title="نسخ الرابط">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                </div>

                <div style="margin: 10px 0; color: var(--text-secondary); font-size: 14px;">------ أو ------</div>

                <!-- الاتصال بالعبد -->
                <div class="input-group">
                    <label>رابط العبد (للاتصال به)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-link"></i>
                        <input type="text" id="friend-id-input" placeholder="ضع رابط العبد هنا...">
                    </div>
                </div>

                <button class="btn-primary" id="connect-btn">
                    <i class="fa-solid fa-plug"></i>
                    بدء المحادثة
                </button>
            </div>
        </div>

        <!-- شاشة الدردشة -->
        <div class="screen" id="chat-screen">
            <div class="chat-header">
                <div class="chat-info">
                    <div class="avatar" id="header-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="status">
                        <span class="status-name" id="header-name">العبد</span>
                        <span class="status-text offline" id="connection-status">غير متصل</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button onclick="location.reload()" title="قطع الاتصال وتجديد الرابط">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>

            <div class="messages-area" id="messages-area">
                <div class="system-msg">أهلا بك في كوكبنا</div>
                <div class="system-msg">تذكر: يجب أن تبقى الصفحة مفتوحة لاستقبال الرسائل.</div>
            </div>

            <div class="input-area">
                <input type="text" id="msg-input" placeholder="اكتب رسالة..." autocomplete="off">
                <button class="send-btn" id="send-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- المتغيرات العامة ---
        let peer;
        let conn;
        let myPeerId = null;
        let myName = "أنا";
        
        // عناصر الواجهة
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const myIdDisplay = document.getElementById('my-id');
        const usernameInput = document.getElementById('username-input');
        const friendIdInput = document.getElementById('friend-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const copyBtn = document.getElementById('copy-btn');
        
        const messagesArea = document.getElementById('messages-area');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const connectionStatus = document.getElementById('connection-status');
        const headerName = document.getElementById('header-name');

        // --- تهيئة PeerJS ---
        function initPeer() {
            // إنشاء كائن Peer باستخدام الخادم العام المجاني
            peer = new Peer(null, {
                debug: 2
            });

            // عند فتح الاتصال والحصول على ID
            peer.on('open', (id) => {
                myPeerId = id;
                myIdDisplay.textContent = myPeerId;
                myIdDisplay.style.color = '#fff';
                showToast("تم إنشاء الرابط الخاص بك");
            });

            // عند استقبال طلب اتصال (مكالمة واردة)
            peer.on('connection', (connection) => {
                handleConnection(connection);
            });

            // في حال حدوث خطأ
            peer.on('error', (err) => {
                console.error(err);
                if (err.type === 'peer-unavailable') {
                    showToast("الرابط غير موجود أو العبد غير متصل");
                } else {
                    showToast("حدث خطأ في الاتصال: " + err.type);
                }
                connectBtn.disabled = false;
                connectBtn.innerHTML = '<i class="fa-solid fa-plug"></i> محاولة مرة أخرى';
            });
        }

        // --- التعامل مع الاتصال ---
        function handleConnection(connection) {
            // إغلاق أي اتصال سابق إذا وجد
            if (conn && conn.open) {
                conn.close();
            }

            conn = connection;

            // مستمعو أحداث الاتصال
            conn.on('open', () => {
                console.log("Connected to: " + conn.peer);
                switchToChat();
                
                // إذا كنا نحن من طلبنا الاتصال، نرسل اسمنا أولاً
                // إذا هم من طلبوا الاتصال، سنستقبل اسمهم عبر حدث data
            });

            conn.on('data', (data) => {
                receiveData(data);
            });

            conn.on('close', () => {
                updateStatus(false);
                showToast("انقطع الاتصال بالعبد");
            });
        }

        // --- بدء الاتصال (ضغط الزر) ---
        connectBtn.addEventListener('click', () => {
            const friendId = friendIdInput.value.trim();
            const username = usernameInput.value.trim();

            if (!username) {
                showToast("الرجاء كتابة اسمك أولاً");
                return;
            }

            if (!friendId) {
                showToast("الرجاء إدخال رابط العبد");
                return;
            }

            if (friendId === myPeerId) {
                showToast("لا يمكنك الاتصال بنفسك!");
                return;
            }

            myName = username;
            connectBtn.disabled = true;
            connectBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الاتصال...';

            // إنشاء اتصال بالطرف الآخر
            const connection = peer.connect(friendId, {
                metadata: { username: myName }
            });
            
            handleConnection(connection);
        });

        // --- تبديل الشاشات ---
        function switchToChat() {
            loginScreen.classList.remove('active');
            chatScreen.classList.add('active');
            updateStatus(true);
            msgInput.focus();
        }

        // --- تحديث الحالة ---
        function updateStatus(isOnline) {
            if (isOnline) {
                connectionStatus.textContent = "متصل الآن";
                connectionStatus.classList.remove('offline');
                connectionStatus.classList.add('online');
            } else {
                connectionStatus.textContent = "غير متصل";
                connectionStatus.classList.remove('online');
                connectionStatus.classList.add('offline');
            }
        }

        // --- استقبال البيانات ---
        function receiveData(data) {
            // إظهار الشاشة إذا كنا لا نزال في شاشة الدخول (اتصال وارد)
            if (!chatScreen.classList.contains('active')) {
                myName = usernameInput.value.trim() || "أنا";
                switchToChat();
                
                // تعيين اسم الصديق من البيانات الواردة (metadata أو رسالة)
                if(data.senderName) {
                    headerName.textContent = data.senderName;
                }
            }

            if (data.type === 'text') {
                appendMessage(data.content, 'received');
                playSound('incoming');
            } else if (data.type === 'name') {
                 // تحديث اسم العبد إذا أرسله
                 headerName.textContent = data.content;
            }
        }

        // --- إرسال البيانات ---
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !conn || !conn.open) return;

            // إرسال الرسالة
            conn.send({
                type: 'text',
                content: text,
                senderName: myName
            });

            appendMessage(text, 'sent');
            msgInput.value = '';
            playSound('outgoing');
        }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // --- عرض الرسائل في الواجهة ---
        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', type);
            
            const time = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            
            msgDiv.innerHTML = `
                ${escapeHtml(text)}
                <span class="msg-time">${time}</span>
            `;
            
            messagesArea.appendChild(msgDiv);
            scrollToBottom();
            
            // حفظ في التاريخ المحلي (اختياري لرؤية المستخدم فقط)
            saveToLocal(text, type);
        }

        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // --- نسخ المعرف ---
        copyBtn.addEventListener('click', () => {
            if (!myPeerId) return;
            navigator.clipboard.writeText(myPeerId).then(() => {
                showToast("تم نسخ المعرف!");
                const originalIcon = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
                setTimeout(() => {
                    copyBtn.innerHTML = originalIcon;
                }, 2000);
            });
        });

        // --- أدوات مساعدة ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        function playSound(type) {
            // صوت بسيط جداً للتأكد، يمكن تعطيله
            // هنا لن نضيف ملفات صوتية خارجية للحفاظ على الملف بسيطاً
            // ولكن يمكن إضافة Audio Object هنا لاحقاً
        }

        function saveToLocal(text, type) {
            // حفظ سجل بسيط في LocalStorage حتى لو أغلق الصفحة سيرى تاريخه هو فقط
            // لا يتم مشاركته مع الصديق (لعدم وجود سيرفر)
            // ميزة إضافية بسيطة
            let history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.push({ text, type, date: new Date().toISOString() });
            if(history.length > 50) history.shift(); // حفظ آخر 50 فقط
            localStorage.setItem('chat_history', JSON.stringify(history));
        }

        // عند بدء التشغيل
        initPeer();

    </script>
</body>
</html>
