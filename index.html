<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Chat - Final Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #202028;
            --chat-bg: #000000;
            --primary: #4cc9f0;
            --accent: #f72585;
            --text-color: #e0e0e0;
            --user-bubble: #4cc9f0;
            --other-bubble: #4895ef;
            --border-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .terminal-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background-color: var(--chat-bg);
            border: 4px solid var(--border-color);
            box-shadow: -4px 0 0 0 rgba(0,0,0,0.5) inset, 4px 0 0 0 rgba(255,255,255,0.2) inset, 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            background-color: var(--accent);
            padding: 10px 15px;
            border-bottom: 4px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            text-shadow: 2px 2px 0 #000;
            color: #fff;
            line-height: 1.5;
        }
        
        .status-badge {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            background: #000;
            color: #ff0000;
            padding: 5px 8px;
            border: 2px solid #fff;
            text-transform: uppercase;
        }
        .status-badge.online { color: #00ff00; }

        #chat-window {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 1.4rem;
        }

        #chat-window::-webkit-scrollbar { width: 14px; }
        #chat-window::-webkit-scrollbar-track { background: #111; }
        #chat-window::-webkit-scrollbar-thumb { background: var(--primary); border: 2px solid #000; }

        .message {
            max-width: 85%;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            position: relative;
            line-height: 1.3;
            word-wrap: break-word;
            box-shadow: 4px 4px 0 #000;
            animation: popIn 0.2s ease;
        }

        @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .message.other { align-self: flex-start; background-color: var(--other-bubble); color: #fff; border-radius: 0 12px 12px 12px; }
        .message.mine { align-self: flex-end; background-color: var(--user-bubble); color: #000; border-radius: 12px 0 12px 12px; box-shadow: -4px 4px 0 #000; }

        .message .meta { 
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem; margin-bottom: 6px; display: block; opacity: 0.9; 
            border-bottom: 1px solid rgba(0,0,0,0.2); padding-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reply-btn {
            cursor: pointer;
            color: #000;
            font-weight: bold;
            font-size: 0.7rem;
            margin-left: 10px;
            user-select: none;
            text-decoration: underline;
        }
        .message.other .reply-btn { color: #fff; }

        .message-quote {
            background-color: rgba(0,0,0,0.3);
            border-right: 3px solid #fff;
            padding: 5px;
            margin-bottom: 8px;
            font-size: 1rem;
            font-style: italic;
            color: #ccc;
        }

        .system-msg { text-align: center; color: #888; font-size: 1.1rem; margin: 10px 0; font-style: italic; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 4px; }

        #reply-preview-bar {
            display: none; 
            background-color: #333;
            border-bottom: 2px solid var(--accent);
            padding: 8px 15px;
            font-size: 1rem;
            justify-content: space-between;
            align-items: center;
        }
        #reply-preview-text { color: #fff; opacity: 0.8; }
        #cancel-reply-btn { 
            color: #ff4757; 
            font-weight: bold; 
            cursor: pointer; 
            border: 1px solid #ff4757;
            padding: 2px 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
        }

        .input-area {
            padding: 10px;
            background-color: #2b2b36;
            border-top: 4px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            background: #000;
            border: 2px solid #555;
            color: var(--primary);
            padding: 10px;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            outline: none;
            width: 100%;
        }
        input:focus { border-color: var(--accent); }

        button {
            background-color: var(--accent);
            color: #fff;
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.1s;
            white-space: nowrap;
        }
        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
        button:disabled { background-color: #555; cursor: not-allowed; transform: none; }
        button.clear-btn { background-color: #ff4757; font-size: 0.6rem; padding: 8px 10px; }

        #login-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .login-box { text-align: center; border: 4px solid var(--border-color); padding: 30px; background: #111; box-shadow: 10px 10px 0 var(--accent); }
        .login-box h2 { font-family: 'Press Start 2P', cursive; color: var(--primary); margin-bottom: 25px; line-height: 1.5; font-size: 1rem; }
        
        @media (max-width: 500px) {
            .terminal-container { height: 100vh; border: none; }
            .message { max-width: 90%; font-size: 1.2rem; }
            h1 { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <header>
            <h1>PIXEL FINAL</h1>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="clear-btn" onclick="clearHistory()">CLR</button>
                <div id="status" class="status-badge">CONNECTING</div>
            </div>
        </header>

        <main id="chat-window">
            <div class="system-msg">Connecting to Global Network...</div>
        </main>

        <!-- Reply Preview Bar -->
        <div id="reply-preview-bar">
            <div id="reply-preview-text">Replying to...</div>
            <div id="cancel-reply-btn" onclick="cancelReply()">X</div>
        </div>

        <footer class="input-area">
            <input type="text" id="message-input" placeholder="TYPE MESSAGE..." disabled autocomplete="off">
            <button id="send-btn" onclick="sendMessage()" disabled>SEND</button>
        </footer>

        <!-- Login Overlay -->
        <div id="login-screen">
            <div class="login-box">
                <h2>ENTER YOUR<br>NICKNAME</h2>
                <input type="text" id="username-input" placeholder="NICKNAME" maxlength="12">
                <br><br>
                <button id="connect-btn" onclick="attemptJoin()">CONNECT</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION (GUN.JS - FINAL) ---
        // IMPORTANT: We use 'https://gun-manhattan.herokuapp.com/gun' which is the primary public relay.
        // We DO NOT force localStorage to avoid "offline only" glitches.
        
        var gun = Gun({
            peers: ['https://gun-manhattan.herokuapp.com/gun']
        });
        
        // CRITICAL: The DB Key is fixed. Both you and your friend MUST use this code.
        var chatDB = gun.get('pixel-chat-final'); 
        
        let myName = "";
        let myId = "user-" + Math.random().toString(36).substr(2, 9);
        
        let renderedMessageIds = new Set(); 
        let replyingTo = null;

        // --- EVENT LISTENERS ---
        document.getElementById('username-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') attemptJoin();
        });
        document.getElementById('message-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        // --- JOIN LOGIC ---
        function attemptJoin() {
            const nameInput = document.getElementById('username-input');
            
            if (!nameInput || !nameInput.value) {
                alert("Please enter a name.");
                return;
            }

            myName = nameInput.value.trim();
            if (myName.length < 2) {
                alert("Name too short.");
                return;
            }

            // Hide Login
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('message-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('message-input').focus();
            
            // Update UI Status
            document.getElementById('status').innerText = "ONLINE";
            document.getElementById('status').classList.add('online');

            // Start Listening
            listenToChat();
            
            addSystemMessage("Connected. Syncing with database...");
        }

        // --- DATABASE LISTENER ---
        function listenToChat() {
            // .map() listens to every item in the list
            // We use .once() first to load history, then .on() for real-time?
            // No, .map().on() handles both historical data and new updates in Gun.
            
            chatDB.map().on(function(data, key) {
                // Gun sometimes sends undefined during syncs
                if (!data || !data.text) return;

                const id = key;

                // Duplicate check
                if (renderedMessageIds.has(id)) return;
                
                renderedMessageIds.add(id);
                
                const isMe = (data.senderId === myId);

                renderMessage(data, isMe, id);
            });
        }

        // --- MESSAGING LOGIC ---
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            const btn = document.getElementById('send-btn');

            if (text !== "") {
                btn.disabled = true;
                btn.innerText = "...";

                const messageData = {
                    sender: myName,
                    senderId: myId,
                    text: text,
                    timestamp: Date.now()
                };

                if (replyingTo) {
                    messageData.replyTo = {
                        sender: replyingTo.sender,
                        text: replyingTo.text
                    };
                }

                // Send to Gun
                // Note: We don't render here. We wait for .map().on to fire back.
                // This ensures we are truly synced with the DB.
                chatDB.set(messageData, function(ack){
                    // Callback executed when server acknowledges
                    btn.disabled = false;
                    btn.innerText = "SEND";
                    input.value = '';
                    input.focus();
                    cancelReply();
                });
            }
        }

        // --- RENDERING ---
        function renderMessage(data, isMe, id) {
            const chatWindow = document.getElementById('chat-window');
            
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isMe ? 'mine' : 'other');
            msgDiv.id = "msg-" + id;

            let innerHTML = '';

            if (data.replyTo) {
                innerHTML += `<div class="message-quote">↩ ${escapeHtml(data.replyTo.sender)}: ${escapeHtml(data.replyTo.text)}</div>`;
            }

            const timeStr = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const dataStr = JSON.stringify(data).replace(/"/g, '&quot;');
            
            innerHTML += `<span class="meta">
                            <span>${escapeHtml(data.sender)} [${timeStr}]</span>
                            <span class="reply-btn" onclick="startReply(${dataStr})">↩ REPLY</span>
                         </span>`;

            innerHTML += escapeHtml(data.text);
            
            msgDiv.innerHTML = innerHTML;
            chatWindow.appendChild(msgDiv);
            scrollToBottom();
        }

        // --- REPLY FUNCTIONS ---
        function startReply(messageObj) {
            replyingTo = messageObj;
            const previewBar = document.getElementById('reply-preview-bar');
            const previewText = document.getElementById('reply-preview-text');
            
            const shortText = messageObj.text.length > 25 ? messageObj.text.substring(0, 25) + "..." : messageObj.text;
            
            previewText.innerText = `Replying to ${messageObj.sender}: "${shortText}"`;
            previewBar.style.display = 'flex';
            document.getElementById('message-input').focus();
        }

        function cancelReply() {
            replyingTo = null;
            document.getElementById('reply-preview-bar').style.display = 'none';
        }

        // --- UTILS ---
        function addSystemMessage(text) {
            const chatWindow = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'system-msg';
            div.innerText = `> ${text}`;
            chatWindow.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chatWindow = document.getElementById('chat-window');
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function clearHistory() {
            if(confirm("Clear local data? This will reset your view but the database remains.")) {
                // Gun stores data in IndexedDB. Clearing it requires specific Gun usage or just reloading.
                // For this simple app, we just reload.
                location.reload();
            }
        }

        function escapeHtml(text) {
            if(!text) return "";
            return text.replace(/[&<>"']/g, function(m) { 
                return {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'}[m]; 
            });
        }
    </script>
</body>
</html>
